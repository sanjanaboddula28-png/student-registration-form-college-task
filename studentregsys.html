<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student Registration System</title>
<style>
  :root{
    --accent:#4f46e5;
    --accent-hover:#4338ca;
    --bg:#f4f5f9;
    --card-bg:#ffffff;
    --text:#1f2330;
    --text-muted:#6b7280;
    --border:#e2e4ea;
    --danger:#e11d48;
    --danger-hover:#be123c;
    --radius:12px;
    --shadow:0 4px 14px rgba(0,0,0,0.06);
  }

  [data-theme="dark"]{
    --bg:#12141c;
    --card-bg:#1c1f2a;
    --text:#f1f2f6;
    --text-muted:#9498a3;
    --border:#2b2f3d;
    --shadow:0 4px 14px rgba(0,0,0,0.4);
  }

  *{ box-sizing:border-box; margin:0; padding:0; }

  body{
    font-family:'Segoe UI', Roboto, Arial, sans-serif;
    background:var(--bg);
    color:var(--text);
    min-height:100vh;
    transition:background .3s ease, color .3s ease;
    padding:24px;
  }

  .container{
    max-width:1100px;
    margin:0 auto;
  }

  header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    flex-wrap:wrap;
    gap:16px;
    margin-bottom:24px;
  }

  header h1{
    font-size:26px;
    font-weight:700;
  }

  header h1 span{ color:var(--accent); }

  .header-actions{
    display:flex;
    align-items:center;
    gap:12px;
    flex-wrap:wrap;
  }

  .icon-btn{
    display:flex;
    align-items:center;
    justify-content:center;
    width:42px;
    height:42px;
    border-radius:50%;
    border:1px solid var(--border);
    background:var(--card-bg);
    cursor:pointer;
    font-size:18px;
    transition:.2s ease;
  }

  .icon-btn:hover{ border-color:var(--accent); transform:translateY(-2px); }

  .color-swatches{
    display:flex;
    gap:6px;
  }

  .swatch{
    width:22px;
    height:22px;
    border-radius:50%;
    cursor:pointer;
    border:2px solid var(--card-bg);
    outline:1px solid var(--border);
    transition:.2s ease;
  }

  .swatch:hover{ transform:scale(1.15); }

  .stats-bar{
    display:flex;
    gap:16px;
    flex-wrap:wrap;
    margin-bottom:24px;
  }

  .stat-card{
    background:var(--card-bg);
    border:1px solid var(--border);
    border-radius:var(--radius);
    padding:16px 22px;
    box-shadow:var(--shadow);
    flex:1;
    min-width:160px;
  }

  .stat-card .stat-label{
    font-size:13px;
    color:var(--text-muted);
    text-transform:uppercase;
    letter-spacing:.05em;
  }

  .stat-card .stat-value{
    font-size:28px;
    font-weight:700;
    color:var(--accent);
    margin-top:4px;
  }

  .layout{
    display:grid;
    grid-template-columns:360px 1fr;
    gap:24px;
    align-items:start;
  }

  @media(max-width:860px){
    .layout{ grid-template-columns:1fr; }
  }

  .panel{
    background:var(--card-bg);
    border:1px solid var(--border);
    border-radius:var(--radius);
    padding:22px;
    box-shadow:var(--shadow);
  }

  .panel h2{
    font-size:18px;
    margin-bottom:16px;
    font-weight:600;
  }

  .form-group{
    margin-bottom:14px;
  }

  label{
    display:block;
    font-size:13px;
    font-weight:600;
    margin-bottom:6px;
    color:var(--text-muted);
  }

  input, select{
    width:100%;
    padding:10px 12px;
    border-radius:8px;
    border:1px solid var(--border);
    background:var(--bg);
    color:var(--text);
    font-size:14px;
    transition:.2s ease;
  }

  input:focus, select:focus{
    outline:none;
    border-color:var(--accent);
    box-shadow:0 0 0 3px rgba(79,70,229,0.15);
  }

  .error-msg{
    color:var(--danger);
    font-size:12px;
    margin-top:4px;
    min-height:14px;
  }

  .btn{
    width:100%;
    padding:12px;
    border:none;
    border-radius:8px;
    background:var(--accent);
    color:#fff;
    font-size:15px;
    font-weight:600;
    cursor:pointer;
    transition:.2s ease;
    margin-top:8px;
  }

  .btn:hover{ background:var(--accent-hover); }

  .search-wrap{
    position:relative;
    margin-bottom:18px;
  }

  .search-wrap input{
    padding-left:36px;
  }

  .search-icon{
    position:absolute;
    left:12px;
    top:50%;
    transform:translateY(-50%);
    color:var(--text-muted);
    pointer-events:none;
  }

  .students-grid{
    display:grid;
    grid-template-columns:repeat(auto-fill, minmax(240px,1fr));
    gap:16px;
  }

  .student-card{
    background:var(--bg);
    border:1px solid var(--border);
    border-radius:var(--radius);
    padding:16px;
    position:relative;
    transition:.2s ease;
    animation:fadeIn .35s ease;
  }

  @keyframes fadeIn{
    from{ opacity:0; transform:translateY(6px); }
    to{ opacity:1; transform:translateY(0); }
  }

  .student-card:hover{
    border-color:var(--accent);
    box-shadow:var(--shadow);
  }

  .student-card .avatar{
    width:44px;
    height:44px;
    border-radius:50%;
    background:var(--accent);
    color:#fff;
    display:flex;
    align-items:center;
    justify-content:center;
    font-weight:700;
    font-size:16px;
    margin-bottom:10px;
  }

  .student-card h3{
    font-size:16px;
    margin-bottom:4px;
  }

  .student-card p{
    font-size:13px;
    color:var(--text-muted);
    margin-bottom:2px;
    word-break:break-word;
  }

  .course-badge{
    display:inline-block;
    margin-top:8px;
    padding:4px 10px;
    border-radius:20px;
    background:rgba(79,70,229,0.12);
    color:var(--accent);
    font-size:12px;
    font-weight:600;
  }

  .delete-btn{
    position:absolute;
    top:12px;
    right:12px;
    width:28px;
    height:28px;
    border-radius:50%;
    border:none;
    background:transparent;
    color:var(--text-muted);
    cursor:pointer;
    font-size:16px;
    transition:.2s ease;
  }

  .delete-btn:hover{
    background:var(--danger);
    color:#fff;
  }

  .empty-state{
    text-align:center;
    padding:50px 20px;
    color:var(--text-muted);
    grid-column:1/-1;
  }

  .empty-state .emoji{
    font-size:40px;
    margin-bottom:10px;
  }

  .toast{
    position:fixed;
    bottom:24px;
    right:24px;
    background:var(--accent);
    color:#fff;
    padding:12px 20px;
    border-radius:8px;
    font-size:14px;
    box-shadow:var(--shadow);
    opacity:0;
    transform:translateY(10px);
    transition:.3s ease;
    pointer-events:none;
    z-index:100;
  }

  .toast.show{
    opacity:1;
    transform:translateY(0);
  }
</style>
</head>
<body>

<div class="container">

  <header>
    <h1>Student<span>Reg</span> System</h1>
    <div class="header-actions">
      <div class="color-swatches" id="colorSwatches">
        <div class="swatch" style="background:#4f46e5" data-color="#4f46e5,#4338ca"></div>
        <div class="swatch" style="background:#0891b2" data-color="#0891b2,#0e7490"></div>
        <div class="swatch" style="background:#059669" data-color="#059669,#047857"></div>
        <div class="swatch" style="background:#d97706" data-color="#d97706,#b45309"></div>
        <div class="swatch" style="background:#db2777" data-color="#db2777,#be185d"></div>
      </div>
      <button class="icon-btn" id="themeToggle" title="Toggle dark mode">🌙</button>
    </div>
  </header>

  <div class="stats-bar">
    <div class="stat-card">
      <div class="stat-label">Total Students</div>
      <div class="stat-value" id="totalCount">0</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Showing</div>
      <div class="stat-value" id="visibleCount">0</div>
    </div>
  </div>

  <div class="layout">

    <div class="panel">
      <h2>➕ Register Student</h2>
      <form id="regForm" novalidate>
        <div class="form-group">
          <label for="nameInput">Full Name</label>
          <input type="text" id="nameInput" placeholder="e.g. Priya Sharma" autocomplete="off">
          <div class="error-msg" id="nameError"></div>
        </div>
        <div class="form-group">
          <label for="emailInput">Email Address</label>
          <input type="email" id="emailInput" placeholder="e.g. priya@email.com" autocomplete="off">
          <div class="error-msg" id="emailError"></div>
        </div>
        <div class="form-group">
          <label for="ageInput">Age</label>
          <input type="number" id="ageInput" placeholder="e.g. 21" min="1" max="120">
          <div class="error-msg" id="ageError"></div>
        </div>
        <div class="form-group">
          <label for="courseInput">Course</label>
          <select id="courseInput">
            <option value="">Select a course</option>
            <option value="Computer Science">Computer Science</option>
            <option value="Business Administration">Business Administration</option>
            <option value="Mechanical Engineering">Mechanical Engineering</option>
            <option value="Design">Design</option>
            <option value="Mathematics">Mathematics</option>
            <option value="Other">Other</option>
          </select>
          <div class="error-msg" id="courseError"></div>
        </div>
        <button type="submit" class="btn">Register Student</button>
      </form>
    </div>

    <div class="panel">
      <h2>📄 Registered Students</h2>
      <div class="search-wrap">
        <span class="search-icon">🔍</span>
        <input type="text" id="searchInput" placeholder="Search by name, email or course...">
      </div>
      <div class="students-grid" id="studentsGrid"></div>
    </div>

  </div>

</div>

<div class="toast" id="toast"></div>

<script>
/* ============================================================
   STATE
   ============================================================ */
let students = [];
let studentIdCounter = 1;

/* ============================================================
   ELEMENT SELECTION - demonstrating multiple DOM query methods
   ============================================================ */

// getElementById()
const regForm       = document.getElementById('regForm');
const nameInput      = document.getElementById('nameInput');
const emailInput     = document.getElementById('emailInput');
const ageInput       = document.getElementById('ageInput');
const courseInput    = document.getElementById('courseInput');
const searchInput    = document.getElementById('searchInput');
const studentsGrid   = document.getElementById('studentsGrid');
const totalCountEl   = document.getElementById('totalCount');
const visibleCountEl = document.getElementById('visibleCount');
const themeToggleBtn = document.getElementById('themeToggle');
const toast          = document.getElementById('toast');

// querySelector() - single element
const header = document.querySelector('header');
const body   = document.querySelector('body');

// querySelectorAll() - multiple elements (NodeList)
const errorMessages = document.querySelectorAll('.error-msg');

// getElementsByClassName() - live HTMLCollection
const statCards = document.getElementsByClassName('stat-card');

// getElementsByTagName() - live HTMLCollection
const allInputs = document.getElementsByTagName('input');

/* ============================================================
   UTILITIES
   ============================================================ */

function showToast(message) {
  toast.textContent = message;
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 2200);
}

function clearErrors() {
  // Loop through NodeList returned by querySelectorAll()
  errorMessages.forEach(el => { el.textContent = ''; });
}

function getInitials(name) {
  return name
    .trim()
    .split(/\s+/)
    .slice(0, 2)
    .map(w => w[0].toUpperCase())
    .join('');
}

/* ============================================================
   FORM VALIDATION
   ============================================================ */

function validateForm() {
  clearErrors();
  let isValid = true;

  const name = nameInput.value.trim();
  const email = emailInput.value.trim();
  const age = ageInput.value.trim();
  const course = courseInput.value;

  if (name.length < 2) {
    document.getElementById('nameError').textContent = 'Enter a valid name (min 2 characters)';
    isValid = false;
  }

  const emailPattern = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
  if (!emailPattern.test(email)) {
    document.getElementById('emailError').textContent = 'Enter a valid email address';
    isValid = false;
  }

  if (!age || age < 1 || age > 120) {
    document.getElementById('ageError').textContent = 'Enter a valid age (1-120)';
    isValid = false;
  }

  if (!course) {
    document.getElementById('courseError').textContent = 'Please select a course';
    isValid = false;
  }

  // Duplicate email check
  if (isValid && students.some(s => s.email.toLowerCase() === email.toLowerCase())) {
    document.getElementById('emailError').textContent = 'A student with this email already exists';
    isValid = false;
  }

  return isValid;
}

/* ============================================================
   CREATE STUDENT CARD - createElement() / appendChild()
   ============================================================ */

function createStudentCard(student) {
  // createElement()
  const card = document.createElement('div');
  card.className = 'student-card';
  card.dataset.id = student.id;

  const avatar = document.createElement('div');
  avatar.className = 'avatar';
  avatar.textContent = getInitials(student.name);

  const name = document.createElement('h3');
  name.textContent = student.name;

  const email = document.createElement('p');
  email.textContent = `📧 ${student.email}`;

  const age = document.createElement('p');
  age.textContent = `🎂 Age: ${student.age}`;

  const courseBadge = document.createElement('span');
  courseBadge.className = 'course-badge';
  courseBadge.textContent = student.course;

  const deleteBtn = document.createElement('button');
  deleteBtn.className = 'delete-btn';
  deleteBtn.title = 'Delete student';
  deleteBtn.dataset.action = 'delete';
  deleteBtn.textContent = '✕';

  // appendChild() - building the card structure
  card.appendChild(avatar);
  card.appendChild(name);
  card.appendChild(email);
  card.appendChild(age);
  card.appendChild(courseBadge);
  card.appendChild(deleteBtn);

  return card;
}

/* ============================================================
   RENDER STUDENTS
   ============================================================ */

function renderStudents(filter = '') {
  // Clear existing grid content
  studentsGrid.innerHTML = '';

  const filtered = students.filter(s => {
    const term = filter.toLowerCase();
    return (
      s.name.toLowerCase().includes(term) ||
      s.email.toLowerCase().includes(term) ||
      s.course.toLowerCase().includes(term)
    );
  });

  if (filtered.length === 0) {
    const empty = document.createElement('div');
    empty.className = 'empty-state';
    empty.innerHTML = `<div class="emoji">🗂️</div><p>No students found</p>`;
    studentsGrid.appendChild(empty);
  } else {
    filtered.forEach(student => {
      const card = createStudentCard(student);
      studentsGrid.appendChild(card);
    });
  }

  totalCountEl.textContent = students.length;
  visibleCountEl.textContent = filtered.length;
}

/* ============================================================
   EVENT: FORM SUBMIT - Register Student
   ============================================================ */

regForm.addEventListener('submit', function(e) {
  e.preventDefault();

  if (!validateForm()) return;

  const newStudent = {
    id: studentIdCounter++,
    name: nameInput.value.trim(),
    email: emailInput.value.trim(),
    age: ageInput.value.trim(),
    course: courseInput.value
  };

  students.push(newStudent);
  renderStudents(searchInput.value);
  regForm.reset();
  showToast(`✅ ${newStudent.name} registered successfully`);
  nameInput.focus();
});

/* ============================================================
   EVENT: DELETE STUDENT via Event Bubbling / Delegation
   Instead of attaching a listener to every delete button,
   we attach ONE listener on the parent grid and let clicks
   bubble up to it, then identify the target with closest().
   ============================================================ */

studentsGrid.addEventListener('click', function(e) {
  const deleteBtn = e.target.closest('[data-action="delete"]');
  if (!deleteBtn) return; // click wasn't on a delete button

  const card = deleteBtn.closest('.student-card');
  const id = Number(card.dataset.id);
  const student = students.find(s => s.id === id);

  // remove() - directly remove the element from the DOM
  card.style.opacity = '0';
  card.style.transform = 'scale(0.9)';
  setTimeout(() => {
    card.remove();
    students = students.filter(s => s.id !== id);
    totalCountEl.textContent = students.length;
    visibleCountEl.textContent = studentsGrid.querySelectorAll('.student-card').length;
    if (students.length === 0 || studentsGrid.children.length === 0) {
      renderStudents(searchInput.value);
    }
    showToast(`🗑️ ${student ? student.name : 'Student'} removed`);
  }, 200);
});

/* ============================================================
   EVENT: SEARCH STUDENT
   ============================================================ */

searchInput.addEventListener('input', function() {
  renderStudents(this.value);
});

/* ============================================================
   EVENT: DARK MODE TOGGLE
   ============================================================ */

themeToggleBtn.addEventListener('click', function() {
  const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
  if (isDark) {
    document.documentElement.removeAttribute('data-theme');
    themeToggleBtn.textContent = '🌙';
    showToast('☀️ Light mode enabled');
  } else {
    document.documentElement.setAttribute('data-theme', 'dark');
    themeToggleBtn.textContent = '☀️';
    showToast('🌙 Dark mode enabled');
  }
});

/* ============================================================
   EVENT: CHANGE ACCENT COLOR (event delegation on swatches)
   ============================================================ */

document.getElementById('colorSwatches').addEventListener('click', function(e) {
  const swatch = e.target.closest('.swatch');
  if (!swatch) return;

  const [main, hover] = swatch.dataset.color.split(',');
  document.documentElement.style.setProperty('--accent', main);
  document.documentElement.style.setProperty('--accent-hover', hover);
  showToast('🎨 Theme color updated');
});

/* ============================================================
   INITIAL DEMO DATA
   ============================================================ */

function seedDemoData() {
  const demo = [
    { name: 'Aarav Mehta', email: 'aarav.mehta@email.com', age: 20, course: 'Computer Science' },
    { name: 'Sara Khan', email: 'sara.khan@email.com', age: 22, course: 'Design' },
    { name: 'Liam O\'Connor', email: 'liam.oc@email.com', age: 21, course: 'Business Administration' }
  ];
  demo.forEach(d => students.push({ id: studentIdCounter++, ...d }));
  renderStudents();
}

seedDemoData();
</script>

</body>
</html>
